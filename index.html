<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Fitness Coach</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#071014">
<style>
:root{
  --bg:#071014;
  --panel:#121a2f;
  --panel2:#18213a;
  --text:#f8fafc;
  --muted:#cbd5e1;
  --blue:#2563eb;
  --cyan:#38bdf8;
  --gold:#facc15;
  --purple:#a855f7;
  --green:#22c55e;
  --yellow:#facc15;
  --red:#ef4444;
  --border:rgba(255,255,255,.14);
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#070b16,#071014 38%,#0b1020);
  color:var(--text);
}
button,input,select,textarea{
  font:inherit;
}
button{
  border:1px solid rgba(255,255,255,.18);
  border-radius:14px;
  padding:.75rem 1rem;
  background:var(--blue);
  color:white;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
}
button:hover{filter:brightness(1.06)}
button.secondary{background:#263244}
button.danger{background:#991b1b}
button:disabled{opacity:.6;cursor:not-allowed}
input,select,textarea{
  width:100%;
  border:1px solid rgba(255,255,255,.16);
  border-radius:12px;
  padding:.75rem;
  background:#0f172a;
  color:var(--text);
}
label{display:block;margin:.5rem 0 .25rem}
.app-shell{
  max-width:980px;
  margin:0 auto;
}
.app-header{
  padding:1.25rem 1rem .75rem;
}
.brand-row{
  display:flex;
  gap:.85rem;
  align-items:center;
}
.brand-icon{
  width:58px;
  height:58px;
  border-radius:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  object-fit:cover;
}
h1{font-size:2rem;line-height:1.05;margin:.15rem 0}
.header-subtext{color:var(--muted);margin:.35rem 0 0;font-size:1rem}
.app-nav{
  display:flex;
  flex-wrap:wrap;
  gap:.55rem;
  padding:.75rem 1rem 1rem;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.app-nav button{
  min-width:135px;
  font-size:1.05rem;
}
.app-nav button.active{
  outline:2px solid var(--cyan);
  box-shadow:0 0 0 4px rgba(56,189,248,.16), inset 0 1px 0 rgba(255,255,255,.16);
}
main{padding:1rem}
.tab{display:none}
.tab.active{display:block}
.panel{
  border:1px solid var(--border);
  border-radius:20px;
  padding:1rem;
  background:rgba(255,255,255,.045);
  box-shadow:0 18px 55px rgba(0,0,0,.28);
}
.muted{color:var(--muted)}
.grid-2{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:1rem;
}
.hero{
  display:grid;
  grid-template-columns:minmax(170px,250px) minmax(0,1fr);
  gap:1rem;
  align-items:start;
}
@media(max-width:760px){
  .hero{grid-template-columns:1fr}
  .app-nav button{min-width:0;flex:1 1 42%}
}
.character-card{
  width:100%;
  max-width:250px;
  height:355px;
  margin:0 auto;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(212,175,55,.78);
  background:#071014;
  box-shadow:0 18px 45px rgba(0,0,0,.45), inset 0 0 32px rgba(212,175,55,.12);
}
.character-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.portrait-label{
  position:absolute;
  left:0;right:0;bottom:0;
  padding:.55rem;
  text-align:center;
  color:white;
  background:linear-gradient(90deg,rgba(0,0,0,.9),rgba(0,0,0,.58));
  border-top:1px solid rgba(212,175,55,.5);
  font-size:.82rem;
}
.avatar-fallback{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:1rem;
  background:radial-gradient(circle at 50% 20%,rgba(168,85,247,.42),#071014 62%);
}
.recovery-mark{
  position:absolute;
  min-width:34px;
  height:26px;
  z-index:5;
  border-radius:999px;
  border:2px solid rgba(255,255,255,.78);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.72rem;
  font-weight:900;
  box-shadow:0 5px 14px rgba(0,0,0,.45);
  color:#071014;
}
.recovery-mark.ready{background:var(--green)}
.recovery-mark.recovering{background:var(--yellow)}
.recovery-mark.fatigued{background:var(--red);color:white}
.recovery-mark[data-part=head]{left:50%;top:20%;transform:translate(-50%,-50%)}
.recovery-mark[data-part=chest]{left:50%;top:42%;transform:translate(-50%,-50%)}
.recovery-mark[data-part=back]{left:72%;top:47%;transform:translate(-50%,-50%)}
.recovery-mark[data-part=arms]{left:25%;top:48%;transform:translate(-50%,-50%)}
.recovery-mark[data-part=core]{left:50%;top:61%;transform:translate(-50%,-50%)}
.recovery-mark[data-part=legs]{left:50%;top:78%;transform:translate(-50%,-50%)}
.recovery-legend{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:.4rem;
  font-size:.82rem;
  margin:.5rem 0 0;
}
.recovery-legend span{
  border:1px solid rgba(255,255,255,.13);
  border-radius:999px;
  padding:.2rem .5rem;
  background:rgba(255,255,255,.055);
}
.status-card{
  border:1px solid rgba(56,189,248,.25);
  border-radius:18px;
  padding:1rem;
  background:rgba(56,189,248,.055);
}
.status-card h2{margin:.1rem 0 .2rem}
.bar-row{margin:.55rem 0}
.bar-label{
  display:flex;
  justify-content:space-between;
  gap:.75rem;
  font-weight:800;
  margin-bottom:.25rem;
}
.bar-track{
  height:13px;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
}
.bar-fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  transition:width .35s ease;
}
.xp .bar-fill{background:linear-gradient(90deg,var(--blue),var(--purple),var(--gold))}
.gear-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:.75rem;
  border:1px solid rgba(250,204,21,.30);
  border-radius:14px;
  padding:.7rem .8rem;
  background:rgba(250,204,21,.08);
  margin-top:.85rem;
}
.gear-row strong{display:block}
.gear-percent{font-weight:900;color:var(--gold);white-space:nowrap}
.recovery-detail{
  border:1px solid rgba(250,204,21,.35);
  background:rgba(250,204,21,.08);
  border-radius:14px;
  padding:.7rem;
  margin-top:.75rem;
}
.daily-card{
  margin-top:1rem;
}
.workout-head{
  display:flex;
  justify-content:space-between;
  gap:.75rem;
  flex-wrap:wrap;
  align-items:center;
}
.focus-pill{
  border:1px solid rgba(250,204,21,.35);
  border-radius:999px;
  padding:.25rem .65rem;
  background:rgba(250,204,21,.10);
  color:var(--gold);
  font-weight:900;
}
.warning{
  border:1px solid rgba(239,68,68,.35);
  border-radius:14px;
  padding:.75rem;
  background:rgba(239,68,68,.08);
  margin:.75rem 0;
}
.exercise-card{
  border:1px solid rgba(255,255,255,.11);
  border-radius:16px;
  padding:.9rem;
  background:rgba(0,0,0,.18);
  margin:.75rem 0;
}
.exercise-card h4{margin:.1rem 0 .35rem}
.set-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
  gap:.45rem;
  margin:.55rem 0;
}
.set-pill{
  border:1px solid rgba(56,189,248,.30);
  background:rgba(56,189,248,.08);
  border-radius:10px;
  padding:.45rem;
  text-align:center;
  font-size:.85rem;
}
.actions{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.85rem}
.guided-panel{
  border:1px solid rgba(168,85,247,.35);
  border-radius:18px;
  padding:1rem;
  background:rgba(168,85,247,.08);
  margin-top:1rem;
}
.guided-stage{font-size:1.1rem;font-weight:900}
.timer{
  text-align:center;
  color:var(--gold);
  font-size:2.35rem;
  font-weight:900;
  margin:.75rem 0;
}
.settings-card,.quest-card{
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:1rem;
  background:rgba(255,255,255,.045);
}
.settings-card h3,.quest-card h3{margin-top:0}
details{margin:.5rem 0}
summary{cursor:pointer;font-weight:900}
.small{font-size:.9rem}

/* v88 Workout Refinement */
.exercise-demo-button{background:#0ea5e9}
.demo-modal{
  position:fixed;inset:0;z-index:10000;background:rgba(2,6,23,.88);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.demo-modal.hidden{display:none}
.demo-card{
  width:min(760px,100%);max-height:90vh;overflow:auto;border:1px solid rgba(255,255,255,.16);
  border-radius:20px;background:#0f172a;color:#f8fafc;padding:1rem;box-shadow:0 22px 70px rgba(0,0,0,.65);
}
.demo-close{float:right;background:#334155}
.demo-video-slot{
  min-height:190px;border:1px dashed rgba(148,163,184,.65);border-radius:16px;
  display:flex;align-items:center;justify-content:center;text-align:center;padding:1rem;margin:1rem 0;background:rgba(255,255,255,.045);
}
.exercise-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}


/* v90 Workout Completion */
.avatar-guidance{border:1px solid rgba(168,85,247,.35);border-radius:14px;padding:.75rem;background:rgba(168,85,247,.08);margin:.75rem 0}
.reward-panel{border:1px solid rgba(34,197,94,.35);border-radius:18px;padding:1rem;background:rgba(34,197,94,.08);margin-top:1rem}
.reward-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem;margin-top:.7rem}
.reward-chip{border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:.65rem;background:rgba(255,255,255,.055);text-align:center;font-weight:800}
.empty-state{border:1px solid rgba(250,204,21,.35);border-radius:18px;padding:1rem;background:rgba(250,204,21,.08);margin:1rem 0}
.demo-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.6rem}
.demo-step{border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:.65rem;background:rgba(255,255,255,.045)}


/* v91 Icon/Header Cleanup */
.brand-row{
  gap:0!important;
}
.brand-icon{
  display:none!important;
}


/* v92 Recovery Defaults + Avatar Marker Polish */
.recovery-mark{
  min-width:26px!important;
  width:26px!important;
  height:26px!important;
  padding:0!important;
  font-size:0!important;
  border-radius:999px!important;
}
.recovery-mark::after{
  content:"";
  width:12px;
  height:12px;
  border-radius:50%;
  background:rgba(255,255,255,.65);
  box-shadow:0 0 10px rgba(255,255,255,.55);
}
.recovery-baseline-note{
  border:1px solid rgba(34,197,94,.35);
  border-radius:14px;
  padding:.65rem;
  background:rgba(34,197,94,.08);
  margin:.65rem 0;
}


/* v93 Class-Based Workout Demos */
.class-demo-layout{display:grid;grid-template-columns:minmax(120px,180px) 1fr;gap:1rem;align-items:start}
.class-demo-portrait{border:2px solid rgba(250,204,21,.65);border-radius:18px;overflow:hidden;background:#071014}
.class-demo-portrait img{width:100%;display:block}
.class-demo-video{border:1px dashed rgba(148,163,184,.65);border-radius:16px;padding:1rem;background:rgba(255,255,255,.045)}
.class-coach-line{border:1px solid rgba(168,85,247,.35);border-radius:14px;padding:.7rem;background:rgba(168,85,247,.08);margin:.75rem 0}
@media(max-width:620px){.class-demo-layout{grid-template-columns:1fr}.class-demo-portrait{max-width:190px;margin:0 auto}}


/* v95 Avatar Visual Polish */
.character-card{
  height:390px!important;
}

  object-fit:contain!important;
  object-position:center top!important;
  background:radial-gradient(circle at 50% 20%,rgba(168,85,247,.22),#071014 70%)!important;
}

  min-width:18px!important;
  width:18px!important;

}

}
.recovery-mark[data-part=head]{left:50%!important;top:22%!important}
.recovery-mark[data-part=chest]{left:50%!important;top:41%!important}
.recovery-mark[data-part=back]{left:68%!important;top:45%!important}

.portrait-label{
  padding:.6rem .5rem!important;

}
.portrait-class-title{
  display:block;

}
.portrait-class-subtitle{
  display:block;

}
@media(max-width:560px){
  .character-card{height:360px!important}
  .recovery-mark{
    width:16px!important;
    height:16px!important;
    min-width:16px!important;
  }
  .recovery-mark::after{
    width:7px!important;
    height:7px!important;
  }
}


/* v95 Demo Portrait Fit */
.class-demo-portrait img{
  object-fit:contain!important;
  object-position:center top!important;
  background:#071014!important;
}

/* v100 Set Completion UI */
.set-pill{position:relative;transition:transform .15s ease,border-color .2s ease,background .2s ease,box-shadow .2s ease}
.set-pill.completed{background:rgba(34,197,94,.24)!important;border-color:rgba(34,197,94,.85)!important;color:#dcfce7!important;box-shadow:0 0 14px rgba(34,197,94,.28);transform:translateY(-1px)}
.set-pill.completed::before{content:"✓ ";color:#22c55e;font-weight:900}
.set-progress-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;margin:.55rem 0}
.set-dots{display:flex;gap:.28rem;align-items:center}
.set-dot{width:11px;height:11px;border-radius:999px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.10)}
.set-dot.completed{background:#22c55e;border-color:#86efac;box-shadow:0 0 8px rgba(34,197,94,.5)}
.set-count-label{font-size:.86rem;color:var(--muted)}
.exercise-card.complete{border-color:rgba(34,197,94,.75)!important;box-shadow:0 0 18px rgba(34,197,94,.22);background:rgba(34,197,94,.075)!important}
.exercise-card.complete h4::before{content:"✓ ";color:#22c55e}
.exercise-complete-reward{border:1px solid rgba(34,197,94,.35);border-radius:12px;padding:.45rem .6rem;background:rgba(34,197,94,.10);color:#dcfce7;font-weight:800;margin:.5rem 0}
.log-set-button{background:#16a34a}
.log-set-button:disabled{background:#334155}


/* v101 Runtime Set Completion Fix */
.exercise-card[data-set-ui-ready="true"] .set-pill{
  position:relative;
  transition:transform .15s ease,border-color .2s ease,background .2s ease,box-shadow .2s ease;
}
.exercise-card[data-set-ui-ready="true"] .set-pill.completed{
  background:rgba(34,197,94,.28)!important;
  border-color:rgba(34,197,94,.9)!important;
  color:#dcfce7!important;
  box-shadow:0 0 14px rgba(34,197,94,.32);
  transform:translateY(-1px);
}
.exercise-card[data-set-ui-ready="true"] .set-pill.completed::before{
  content:"✓ ";
  color:#22c55e;
  font-weight:900;
}
.set-progress-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.75rem;
  flex-wrap:wrap;
  margin:.55rem 0;
}
.set-dots{
  display:flex;
  gap:.28rem;
  align-items:center;
}
.set-dot{
  width:11px;
  height:11px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.10);
}
.set-dot.completed{
  background:#22c55e;
  border-color:#86efac;
  box-shadow:0 0 8px rgba(34,197,94,.5);
}
.set-count-label{
  font-size:.86rem;
  color:var(--muted);
}
.exercise-card.complete{
  border-color:rgba(34,197,94,.75)!important;
  box-shadow:0 0 18px rgba(34,197,94,.22);
  background:rgba(34,197,94,.075)!important;
}
.exercise-card.complete h4::before{
  content:"✓ ";
  color:#22c55e;
}
.exercise-complete-reward{
  border:1px solid rgba(34,197,94,.35);
  border-radius:12px;
  padding:.45rem .6rem;
  background:rgba(34,197,94,.10);
  color:#dcfce7;
  font-weight:800;
  margin:.5rem 0;
}
button[data-log-exercise]{
  background:#16a34a;
}
button[data-log-exercise]:disabled{
  background:#334155;
}

</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="brand-row">
<div>
        <h1>Fitness Coach</h1>
        <p class="header-subtext">RPG-powered workout, recovery, and progress coach.</p>
      </div>
    </div>
  </header>

  <nav class="app-nav" aria-label="Main navigation">
    <button data-tab="workout" class="active">💪 Workout</button>
    <button data-tab="quests">🗡️ Quests</button>
    <button data-tab="settings">⚙️ Settings</button>
  </nav>

  <main>
    <section id="workout" class="tab active"></section>
    <section id="quests" class="tab"></section>
    <section id="settings" class="tab"></section>
  </main>
</div>

<script>
(function(){
"use strict";

const $ = id => document.getElementById(id);
const qs = sel => document.querySelector(sel);
const safeParse = (key, fallback) => {
  try { return JSON.parse(localStorage.getItem(key) || "null") ?? fallback; }
  catch { return fallback; }
};
const save = (key, value) => localStorage.setItem(key, JSON.stringify(value));
const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const pct = value => Math.max(0, Math.min(100, Math.round(Number(value || 0))));

const CLASSES = {
  sage:{emoji:"🧠",name:"Sage",title:"Wise Mover",gear:["Scholar Robes","Adept Robes","Arcane Vestments","Archsage Regalia","Mythic Sage Regalia"]},
  guardian:{emoji:"🛡️",name:"Guardian",title:"Iron Wall",gear:["Recruit Armor","Iron Armor","Knight Armor","Champion Armor","Mythic Guardian Plate"]},
  ranger:{emoji:"⚡",name:"Ranger",title:"Storm Runner",gear:["Traveler Gear","Scout Kit","Ranger Cloak","Storm Ranger Gear","Mythic Ranger Mantle"]},
  phoenix:{emoji:"🔥",name:"Phoenix",title:"Rising Flame",gear:["Initiate Gear","Ember Gear","Flame-Forged Armor","Ascendant Phoenix Gear","Mythic Phoenix Raiment"]},
  explorer:{emoji:"⛰️",name:"Explorer",title:"Master Pathfinder",gear:["Trail Garb","Expedition Gear","Pathfinder Mantle","Master Explorer Kit","Mythic Wayfinder Regalia"]}
};


const EXERCISE_LIBRARY = {
  legs:[
    {name:"Goblet Squat",focus:"Legs",sets:3,reps:"8–12",rest:60,tips:["Chest tall","Drive through heels","Control the lowering"]},
    {name:"Reverse Lunge",focus:"Legs",sets:3,reps:"8 each side",rest:60,tips:["Step back softly","Keep front knee stable","Stand tall"]},
    {name:"Step-Up",focus:"Legs",sets:3,reps:"8 each side",rest:60,tips:["Drive through full foot","Control down","Keep hips level"]}
  ],
  chest:[
    {name:"Incline Push-Up",focus:"Chest",sets:3,reps:"8–12",rest:60,tips:["Brace core","Lower under control","Press strong"]},
    {name:"Dumbbell Floor Press",focus:"Chest",sets:3,reps:"8–12",rest:75,tips:["Elbows at 45 degrees","Pause lightly","Press evenly"]},
    {name:"Push-Up Hold",focus:"Chest",sets:2,reps:"20–30 sec",rest:45,tips:["Body straight","Press the floor away","Breathe steadily"]}
  ],
  back:[
    {name:"Dumbbell Row",focus:"Back",sets:3,reps:"10 each side",rest:60,tips:["Pull elbow back","Keep back flat","Pause at the top"]},
    {name:"Band Row",focus:"Back",sets:3,reps:"12–15",rest:45,tips:["Squeeze shoulder blades","Do not shrug","Control the return"]},
    {name:"Hip Hinge Drill",focus:"Back",sets:2,reps:"10",rest:45,tips:["Hips back","Neutral spine","Move slowly"]}
  ],
  arms:[
    {name:"Farmer Carry",focus:"Arms",sets:2,reps:"30 sec",rest:60,tips:["Stand tall","Grip hard","Walk slowly"]},
    {name:"Dumbbell Curl",focus:"Arms",sets:2,reps:"10–12",rest:45,tips:["Keep elbows still","Control down","Do not swing"]},
    {name:"Overhead Triceps Extension",focus:"Arms",sets:2,reps:"10–12",rest:45,tips:["Ribs down","Elbows point forward","Move smoothly"]}
  ],
  core:[
    {name:"Glute Bridge",focus:"Core",sets:2,reps:"12–15",rest:45,tips:["Squeeze glutes","Ribs down","Move smoothly"]},
    {name:"Dead Bug",focus:"Core",sets:2,reps:"8 each side",rest:45,tips:["Low back heavy","Move opposite limbs","Exhale slowly"]},
    {name:"Side Plank",focus:"Core",sets:2,reps:"20 sec each side",rest:45,tips:["Stack shoulders","Lift hips","Breathe steadily"]}
  ],
  mobility:[
    {name:"World's Greatest Stretch",focus:"Mobility",sets:2,reps:"5 each side",rest:30,tips:["Move slowly","Open the hips","Rotate through upper back"]},
    {name:"Cat Cow",focus:"Mobility",sets:2,reps:"8",rest:30,tips:["Move one segment at a time","Breathe","Stay gentle"]},
    {name:"Walk",focus:"Recovery",sets:1,reps:"10–20 min",rest:0,tips:["Keep it easy","Nose breathing if possible","Finish refreshed"]}
  ]
};

const DEFAULT_EXERCISES = [
  {name:"Goblet Squat",focus:"Legs",sets:3,reps:"8–12",rest:60,tips:["Chest tall","Drive through heels","Control the lowering"]},
  {name:"Incline Push-Up",focus:"Chest",sets:3,reps:"8–12",rest:60,tips:["Brace core","Lower under control","Press strong"]},
  {name:"Dumbbell Row",focus:"Back",sets:3,reps:"10 each side",rest:60,tips:["Pull elbow back","Keep back flat","Pause at the top"]},
  {name:"Glute Bridge",focus:"Core",sets:2,reps:"12–15",rest:45,tips:["Squeeze glutes","Ribs down","Move smoothly"]},
  {name:"Farmer Carry",focus:"Arms",sets:2,reps:"30 sec",rest:60,tips:["Stand tall","Grip hard","Walk slowly"]}
];

let guided = { exercise:0, set:0, rest:0, timer:null, exercises:[] };

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getProgress(){
  const p = safeParse("characterProgress", {});
  return {
    level:Number(p.level || 1),
    xp:Number(p.xp || 0),
    xpToNext:Number(p.xpToNext || 500),
    bars:p.bars || {}
  };
}

function getClassKey(){
  const profile = safeParse("characterProfile", {});
  return CLASSES[profile.archetype] ? profile.archetype : "sage";
}


function getAvatarStyle(){
  const characterProfile = safeParse("characterProfile", {});
  const userProfile = safeParse("userProfile", {});
  const raw = String(characterProfile.avatarStyle || characterProfile.gender || userProfile.avatarStyle || userProfile.gender || "male").toLowerCase();
  if(raw.startsWith("f") || raw === "woman" || raw === "female") return "f";
  return "m";
}

function levelTier(level){
  if(level >= 100) return 4;
  if(level >= 50) return 3;
  if(level >= 25) return 2;
  if(level >= 10) return 1;
  return 0;
}

function nextLevel(level){
  if(level < 10) return 10;
  if(level < 25) return 25;
  if(level < 50) return 50;
  if(level < 100) return 100;
  return null;
}

function gearProgress(level){
  const next = nextLevel(level);
  if(!next) return 100;
  const prev = next === 10 ? 1 : next === 25 ? 10 : next === 50 ? 25 : 50;
  return pct(((level - prev) / (next - prev)) * 100);
}


function hasWorkoutHistory(){
  const workoutLogs = safeParse("workoutLogs", []);
  const exerciseLogs = safeParse("exerciseLogs", []);
  return (Array.isArray(workoutLogs) && workoutLogs.length > 0) || (Array.isArray(exerciseLogs) && exerciseLogs.length > 0);
}

function getRecoveryMap(){
  const bars = getProgress().bars || {};
  const hasHistory = hasWorkoutHistory();

  // Recovery means readiness: 100% = fully ready, 0% = exhausted.
  // New users with no workout history start fully recovered.
  const defaultRecovery = hasHistory ? 80 : 100;
  const general = Number(bars.recovery ?? defaultRecovery);

  return {
    head:pct(bars.head ?? defaultRecovery),
    chest:pct(bars.chest ?? defaultRecovery),
    back:pct(bars.back ?? defaultRecovery),
    arms:pct(bars.arms ?? defaultRecovery),
    core:pct(bars.core ?? defaultRecovery),
    legs:pct(bars.legs ?? defaultRecovery)
  };
}


function recoveryState(value){
  if(value >= 80) return ["ready","Ready","🟢"];
  if(value >= 40) return ["recovering","Recovering","🟡"];
  return ["fatigued","Fatigued","🔴"];
}

function getWorkoutPlan(){
  for(const key of ["activeWorkoutPlan","currentWorkoutPlan","sevenDayWorkoutPlan","generatedWorkoutPlan","workoutPlan"]){
    const value = safeParse(key, null);
    if(value) return value;
  }
  return null;
}

function normalizeExercise(ex){
  return {
    name:ex.name || ex.exercise || ex.title || "Exercise",
    focus:ex.focus || ex.muscle || ex.bodyPart || "Full Body",
    sets:Number(ex.sets || 3),
    reps:ex.reps || ex.repRange || "8–12",
    rest:Number(ex.rest || ex.restSeconds || 60),
    tips:Array.isArray(ex.tips) ? ex.tips : [ex.coaching || "Move with control."]
  };
}


function getExercises(){
  const plan = getWorkoutPlan();
  const recovery = getRecoveryMap();
  let planned = null;
  if(plan){
    if(Array.isArray(plan)) planned = plan.length ? plan.map(normalizeExercise) : null;
    else if(Array.isArray(plan.exercises)) planned = plan.exercises.map(normalizeExercise);
    else if(Array.isArray(plan.days)){
      const day = plan.days[new Date().getDay()] || plan.days[0];
      if(day && Array.isArray(day.exercises)) planned = day.exercises.map(normalizeExercise);
    } else {
      const today = plan[todayKey()] || plan.today || plan.currentDay;
      if(today && Array.isArray(today.exercises)) planned = today.exercises.map(normalizeExercise);
    }
  }
  if(planned && recoveryWarnings(planned).length === 0) return planned;
  return buildRecoveryDrivenWorkout(recovery);
}

function buildRecoveryDrivenWorkout(recovery){
  const ordered = Object.entries({legs:recovery.legs,chest:recovery.chest,back:recovery.back,arms:recovery.arms,core:recovery.core}).sort((a,b)=>b[1]-a[1]);
  const ready = ordered.filter(([,v])=>v>=80).map(([k])=>k);
  const usable = ordered.filter(([,v])=>v>=40).map(([k])=>k);
  const chosen = (ready.length >= 3 ? ready : usable.length >= 3 ? usable : ["mobility","core","back"]).slice(0,3);
  const workout = [];
  chosen.forEach((part,idx)=>{ const lib = EXERCISE_LIBRARY[part] || EXERCISE_LIBRARY.mobility; workout.push({...lib[idx % lib.length]}); });
  if(!chosen.includes("core") && recovery.core >= 40) workout.push({...EXERCISE_LIBRARY.core[1]});
  else workout.push({...EXERCISE_LIBRARY.mobility[0]});
  workout.guidance = avatarGuidanceText(recovery, chosen);
  return workout;
}

function avatarGuidanceText(recovery, chosen){
  const fatigued = Object.entries(recovery).filter(([,v])=>v<40).map(([k])=>k);
  const focus = chosen.map(x=>x[0].toUpperCase()+x.slice(1)).join(", ");
  if(fatigued.length) return `Avatar guidance: focusing on ${focus} while protecting fatigued areas: ${fatigued.join(", ")}.`;
  return `Avatar guidance: today's workout targets the most recovered areas: ${focus}.`;
}


function recoveryWarnings(exercises){
  const r = getRecoveryMap();
  const low = [];
  for(const ex of exercises){
    const focus = String(ex.focus || "").toLowerCase();
    const name = String(ex.name || "").toLowerCase();
    const text = `${focus} ${name}`;
    if((text.includes("leg") || text.includes("squat") || text.includes("lunge")) && r.legs < 40) low.push("Legs");
    if((text.includes("back") || text.includes("row") || text.includes("deadlift")) && r.back < 40) low.push("Back");
    if((text.includes("chest") || text.includes("push")) && r.chest < 40) low.push("Chest");
    if((text.includes("arm") || text.includes("curl") || text.includes("carry")) && r.arms < 40) low.push("Arms");
    if((text.includes("core") || text.includes("plank")) && r.core < 40) low.push("Core");
  }
  return [...new Set(low)];
}

function bar(label, value, detail, klass=""){
  const width = pct(value);
  return `<div class="bar-row ${klass}">
    <div class="bar-label"><span>${esc(label)}</span><span>${esc(detail || width + "%")}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
  </div>`;
}

function renderWorkout(){
  const section = $("workout");
  const p = getProgress();
  const classKey = getClassKey();
  const info = CLASSES[classKey];
  const tier = levelTier(p.level);
  const xpPct = p.xpToNext ? pct((p.xp / p.xpToNext) * 100) : 0;
  const portrait = `${classKey}-${getAvatarStyle()}-v3.png`;
  const bars = p.bars || {};
  const exercises = getExercises();
  const warnings = recoveryWarnings(exercises);

  section.innerHTML = `
    <div class="panel">
      <div class="hero">
        <div>
          <div class="character-card" id="characterCard">
            <img src="${portrait}" alt="Level ${p.level} ${info.name} portrait" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar-fallback',innerHTML:'<div><strong>${info.name}</strong><br>Missing portrait<br>${portrait}</div>'}))">
            <div class="portrait-label"><span class="portrait-class-title">${info.emoji} ${info.name.toUpperCase()}</span><span class="portrait-class-subtitle">${esc(info.title)} • Level ${p.level}</span></div>
          </div>
          <div class="recovery-legend"><span>🟢 Ready</span><span>🟡 Recovering</span><span>🔴 Fatigued</span></div>
          ${!hasWorkoutHistory() ? `<div class="recovery-baseline-note small">No workout history yet: body recovery starts at 100% ready.</div>` : ""}
          <div id="recoveryDetail"></div>
        </div>
        <div class="status-card">
          <h2>Level ${p.level} ${info.emoji} ${info.name}</h2>
          <p class="muted">${esc(info.title)}</p>
          ${bar("XP", xpPct, `${p.xp} / ${p.xpToNext} XP`, "xp")}
          ${bar("Strength", bars.strength || 0)}
          ${bar("Endurance", bars.endurance || 0)}
          ${bar("Mobility", bars.mobility || 0)}
          ${bar("Recovery", bars.recovery ?? (hasWorkoutHistory() ? 80 : 100))}
          ${bar("Consistency", bars.consistency || 0)}
          <div class="gear-row">
            <div><span class="muted">Current Gear</span><strong>${esc(info.gear[tier])}</strong></div>
            <div class="gear-percent">${gearProgress(p.level)}%</div>
          </div>
        </div>
      </div>

      ${!safeParse("userProfile", null) ? `<div class="empty-state"><strong>Initial setup recommended.</strong><br><span class="muted">Workout is using a safe starter plan. Complete assessment later in Settings to personalize training.</span></div>` : ""}
      <div class="daily-card">
        <div class="workout-head">
          <div>
            <h2>Today's Workout</h2>
            <p class="muted">${new Date().toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})}</p>
          </div>
          <span class="focus-pill">${warnings.length ? "Adjust for Recovery" : "Ready Training"}</span>
        </div>
        ${exercises.guidance ? `<div class="avatar-guidance"><strong>Avatar Coach:</strong> ${esc(exercises.guidance)}</div>` : ""}
        ${warnings.length ? `<div class="warning"><strong>Recovery Warning:</strong> ${warnings.join(", ")} may be fatigued. Reduce load, range, or volume today.</div>` : ""}
        <div id="exerciseList">
          ${exercises.map((ex,index)=>`
            <div class="exercise-card">
              <h4>${index+1}. ${esc(ex.name)}</h4>
              <p class="muted">${esc(ex.focus)} • Rest ${ex.rest}s</p>
              <div class="set-progress-row">
                <div class="set-dots" data-set-dots="${index}">
                  ${Array.from({length:ex.sets}).map((_,set)=>`<span class="set-dot" data-dot-index="${set}"></span>`).join("")}
                </div>
                <span class="set-count-label" data-set-count="${index}">0 / ${ex.sets} Sets Complete</span>
              </div>
              <div class="set-grid" data-set-grid="${index}">
                ${Array.from({length:ex.sets}).map((_,set)=>`<div class="set-pill" data-set-index="${set}">Set ${set+1}<br>${esc(ex.reps)}</div>`).join("")}
              </div>
              <div class="exercise-complete-reward" data-exercise-reward="${index}" style="display:none">Exercise Complete • +25 XP</div>
              <p><strong>Coach Tip:</strong> ${esc(ex.tips[0] || "Move with control.")}</p>
              <div class="exercise-actions"><button class="exercise-demo-button" data-demo-exercise="${index}">Demo</button><button class="log-set-button" data-log-exercise="${index}">Log Set</button></div>
            </div>
          `).join("")}
        </div>
        <div class="actions">
          <button id="startGuided">Start Guided Workout</button>
          <button id="completeWorkout" class="secondary">Complete Workout</button>
        </div>
        <div id="guidedPanel"></div>
      </div>
    </div>`;

  renderRecoveryMarks();
  wireWorkoutButtons(exercises);
}

function renderRecoveryMarks(){
  const card = $("characterCard");
  if(!card) return;
  const map = getRecoveryMap();
  for(const [part,value] of Object.entries(map)){
    const [klass,label,dot] = recoveryState(value);
    const btn = document.createElement("button");
    btn.className = `recovery-mark ${klass}`;
    btn.dataset.part = part;
    btn.type = "button";
    btn.title = `${part}: ${value}% ${label}`;
    btn.textContent = dot;
    btn.addEventListener("click", () => {
      const detail = $("recoveryDetail");
      const hours = value >= 80 ? "Ready now" : value >= 40 ? "6–18 hours" : "18–36 hours";
      detail.innerHTML = `<div class="recovery-detail"><strong>${dot} ${part[0].toUpperCase()+part.slice(1)}</strong><br>Recovery: ${value}% — ${label}<br><span class="muted">Expected full recovery: ${hours}</span></div>`;
    });
    card.appendChild(btn);
  }
}



function currentClassInfo(){
  const key = getClassKey();
  return {key, info:CLASSES[key]};
}

function classCoachLine(ex){
  const {key, info} = currentClassInfo();
  const lines = {
    sage:`${info.name} guidance: move with control, keep pain low, and treat each rep like practice.`,
    guardian:`${info.name} guidance: brace hard, protect your joints, and build strength with steady form.`,
    ranger:`${info.name} guidance: stay light, efficient, and smooth through every rep.`,
    phoenix:`${info.name} guidance: rise with intensity, but stop before form breaks down.`,
    explorer:`${info.name} guidance: move deliberately, learn the pattern, and build range safely.`
  };
  return lines[key] || `${info.name} guidance: move safely and with control.`;
}

function openDemo(ex){
  const {key, info} = currentClassInfo();
  let modal = $("exerciseDemoModal");
  if(!modal){
    modal = document.createElement("div");
    modal.id = "exerciseDemoModal";
    modal.className = "demo-modal hidden";
    document.body.appendChild(modal);
  }
  modal.className = "demo-modal";
  modal.innerHTML = `<div class="demo-card">
    <button class="demo-close" id="closeDemoModal">Close</button>
    <h2>${info.emoji} ${esc(info.name)} Demo: ${esc(ex.name)}</h2>
    <p class="muted">${esc(ex.focus)} • ${esc(ex.reps)} • Rest ${ex.rest}s</p>
    <div class="class-demo-layout">
      <div class="class-demo-portrait">
        <img src="${key}-${getAvatarStyle()}-v3.png" alt="${esc(info.name)} demonstrating ${esc(ex.name)}">
      </div>
      <div class="class-demo-video">
        <strong>${esc(info.name)} demonstrates ${esc(ex.name)}</strong><br>
        <span class="muted">This is the class-based demo placeholder. Video or animation assets can later replace this area while keeping the same class coach.</span>
        <div class="class-coach-line">${esc(classCoachLine(ex))}</div>
      </div>
    </div>
    <h3>How ${esc(info.name)} coaches this movement</h3>
    <div class="demo-steps">
      ${(ex.tips || []).map((t,i) => `<div class="demo-step"><strong>Step ${i+1}</strong><br>${esc(t)}</div>`).join("")}
    </div>
    <p class="muted">Keep movements controlled. Stop if pain feels sharp or unsafe.</p>
  </div>`;
  $("closeDemoModal").addEventListener("click", () => modal.className = "demo-modal hidden");
  modal.addEventListener("click", event => {
    if(event.target === modal) modal.className = "demo-modal hidden";
  }, {once:true});
}


function getSetProgress(){
  return safeParse(`setProgress-${todayKey()}`, {});
}

function saveSetProgress(progress){
  save(`setProgress-${todayKey()}`, progress);
}

function getExerciseSetCount(exerciseIndex){
  const progress = getSetProgress();
  return Number(progress[exerciseIndex] || 0);
}

function setExerciseSetCount(exerciseIndex, count){
  const progress = getSetProgress();
  progress[exerciseIndex] = count;
  saveSetProgress(progress);
}

function updateSetUI(exerciseIndex, exercises){
  const ex = exercises[exerciseIndex];
  if(!ex) return;
  const count = Math.min(getExerciseSetCount(exerciseIndex), ex.sets);
  const card = document.querySelector(`[data-exercise-index="${exerciseIndex}"]`);
  if(!card) return;

  card.querySelectorAll(".set-pill").forEach(pill => {
    const setIndex = Number(pill.dataset.setIndex);
    pill.classList.toggle("completed", setIndex < count);
  });

  card.querySelectorAll(".set-dot").forEach(dot => {
    const setIndex = Number(dot.dataset.dotIndex);
    dot.classList.toggle("completed", setIndex < count);
  });

  const label = card.querySelector(`[data-set-count="${exerciseIndex}"]`);
  if(label) label.textContent = `${count} / ${ex.sets} Sets Complete`;

  const reward = card.querySelector(`[data-exercise-reward="${exerciseIndex}"]`);
  if(reward) reward.style.display = count >= ex.sets ? "block" : "none";

  const button = card.querySelector(`[data-log-exercise="${exerciseIndex}"]`);
  if(button){
    if(count >= ex.sets){
      button.textContent = "Exercise Complete ✓";
      button.disabled = true;
    } else {
      button.textContent = `Log Set ${count + 1}`;
      button.disabled = false;
    }
  }

  card.classList.toggle("complete", count >= ex.sets);
}

function restoreAllSetUI(exercises){
  exercises.forEach((_, index) => updateSetUI(index, exercises));
}

function wireWorkoutButtons(exercises){

  document.querySelectorAll("[data-demo-exercise]").forEach(button => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.demoExercise);
      openDemo(exercises[index]);
    });
  });

  document.querySelectorAll("[data-log-exercise]").forEach(button => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.logExercise);
      const ex = exercises[index];
      const current = getExerciseSetCount(index);
      if(current >= ex.sets) return;
      const nextCount = current + 1;
      setExerciseSetCount(index, nextCount);
      const logs = safeParse("exerciseLogs", []);
      logs.push({date:todayKey(),completedAt:new Date().toISOString(),exercise:ex,setNumber:nextCount,totalSets:ex.sets});
      save("exerciseLogs", logs);
      updateSetUI(index, exercises);
    });
  });
  restoreAllSetUI(exercises);
  $("startGuided").addEventListener("click", () => startGuided(exercises));
  $("completeWorkout").addEventListener("click", () => {
    completeWorkoutWithRewards(exercises);
  });
}


function completeWorkoutWithRewards(exercises){
  const logs = safeParse("workoutLogs", []);
  logs.push({date:todayKey(),completedAt:new Date().toISOString(),exercises});
  save("workoutLogs", logs);
  localStorage.removeItem(`setProgress-${todayKey()}`);
  const rewards = calculateRewards(exercises);
  applyRewards(rewards);
  const panel = $("guidedPanel");
  panel.innerHTML = `<div class="reward-panel">
    <h3>Workout Complete</h3>
    <p>You earned progress for today's training.</p>
    <div class="reward-grid">
      <div class="reward-chip">+${rewards.xp} XP</div>
      <div class="reward-chip">Strength +${rewards.bars.strength}</div>
      <div class="reward-chip">Endurance +${rewards.bars.endurance}</div>
      <div class="reward-chip">Mobility +${rewards.bars.mobility}</div>
      <div class="reward-chip">Consistency +${rewards.bars.consistency}</div>
    </div>
    <button id="refreshAfterReward">Refresh Status</button>
  </div>`;
  $("refreshAfterReward").addEventListener("click", renderWorkout);
}

function calculateRewards(exercises){
  const rewards = {xp:25 + exercises.length*10, bars:{strength:0,endurance:0,mobility:0,recovery:0,consistency:8}};
  exercises.forEach(ex=>{
    const text = `${ex.focus} ${ex.name}`.toLowerCase();
    if(text.includes("leg") || text.includes("chest") || text.includes("arm") || text.includes("squat") || text.includes("push")) rewards.bars.strength += 4;
    if(text.includes("back") || text.includes("row") || text.includes("carry") || text.includes("walk")) rewards.bars.endurance += 4;
    if(text.includes("mobility") || text.includes("stretch") || text.includes("cat cow")) rewards.bars.mobility += 5;
    if(text.includes("core") || text.includes("bridge") || text.includes("plank")) rewards.bars.mobility += 2;
  });
  return rewards;
}

function applyRewards(rewards){
  const p = safeParse("characterProgress", {});
  p.level = Number(p.level || 1);
  p.xp = Number(p.xp || 0) + rewards.xp;
  p.xpToNext = Number(p.xpToNext || 500);
  p.bars = p.bars || {};
  Object.entries(rewards.bars).forEach(([key,value])=>{ p.bars[key] = Math.min(100, Number(p.bars[key] || 0) + value); });
  while(p.xp >= p.xpToNext){ p.xp -= p.xpToNext; p.level += 1; p.xpToNext = Math.round(p.xpToNext * 1.08); }
  save("characterProgress", p);
}

function startGuided(exercises){
  guided = {exercise:0,set:0,rest:0,timer:null,exercises};
  renderGuided();
}

function renderGuided(){
  const panel = $("guidedPanel");
  const ex = guided.exercises[guided.exercise];
  if(!ex){
    panel.innerHTML = `<div class="guided-panel"><h3>Quest Complete</h3><p>Workout finished. Great work.</p></div>`;
    return;
  }
  panel.innerHTML = `<div class="guided-panel">
    <h3>Guided Workout</h3>
    <p class="guided-stage">${esc(ex.name)}</p>
    <p>Set ${guided.set+1} of ${ex.sets} • ${esc(ex.reps)}</p>
    <p><strong>Coach:</strong> ${esc(ex.tips[guided.set % ex.tips.length] || "Stay controlled and strong.")}</p>
    <button id="finishSet">Finish Set</button>
    <button id="stopGuided" class="secondary">Stop</button>
  </div>`;
  $("finishSet").addEventListener("click", finishSet);
  $("stopGuided").addEventListener("click", () => {
    if(guided.timer) clearInterval(guided.timer);
    panel.innerHTML = "";
  });
}

function finishSet(){
  const ex = guided.exercises[guided.exercise];
  guided.rest = ex.rest;
  renderRest();
  if(guided.timer) clearInterval(guided.timer);
  guided.timer = setInterval(() => {
    guided.rest -= 1;
    if(guided.rest <= 0){
      clearInterval(guided.timer);
      guided.timer = null;
      guided.set += 1;
      if(guided.set >= ex.sets){
        guided.exercise += 1;
        guided.set = 0;
      }
      renderGuided();
    } else {
      renderRest();
    }
  }, 1000);
}

function renderRest(){
  const panel = $("guidedPanel");
  const ex = guided.exercises[guided.exercise];
  panel.innerHTML = `<div class="guided-panel">
    <h3>Rest</h3>
    <div class="timer">${guided.rest}</div>
    <p><strong>Next:</strong> ${esc(ex?.name || "Workout Complete")}</p>
    <p class="muted">Breathe, reset, and prepare for the next set.</p>
    <button id="skipRest">Skip Rest</button>
  </div>`;
  $("skipRest").addEventListener("click", () => {
    if(guided.timer) clearInterval(guided.timer);
    guided.timer = null;
    guided.set += 1;
    if(guided.set >= (ex?.sets || 1)){
      guided.exercise += 1;
      guided.set = 0;
    }
    renderGuided();
  });
}

function renderQuests(){
  $("quests").innerHTML = `<div class="panel">
    <h2>Quests</h2>
    <p class="muted">Quest cleanup is next. Workout is now the clean daily-use screen.</p>
    <div class="quest-card">
      <h3>Daily Quest</h3>
      <p>Complete today’s workout.</p>
      <span class="focus-pill">+50 XP</span>
    </div>
  </div>`;
}

function renderSettings(){
  const p = getProgress();
  const info = CLASSES[getClassKey()];
  const tier = levelTier(p.level);
  const next = nextLevel(p.level);
  $("settings").innerHTML = `<div class="panel">
    <h2>Settings</h2>
    <p class="muted">Rarely used setup items live here so Workout stays clean.</p>
    <div class="grid-2">
      <div class="settings-card">
        <h3>Assessment</h3>
        <p class="muted">Retake assessment to update workouts, character, goals, and recovery.</p>
        <button id="retakeAssessment">Retake Assessment</button>
      </div>
      <div class="settings-card">
        <h3>Recovery Days</h3>
        <label><input type="checkbox" value="mon" class="rec-day"> Monday</label>
        <label><input type="checkbox" value="tue" class="rec-day"> Tuesday</label>
        <label><input type="checkbox" value="wed" class="rec-day"> Wednesday</label>
        <label><input type="checkbox" value="thu" class="rec-day"> Thursday</label>
        <label><input type="checkbox" value="fri" class="rec-day"> Friday</label>
        <label><input type="checkbox" value="sat" class="rec-day"> Saturday</label>
        <label><input type="checkbox" value="sun" class="rec-day"> Sunday</label>
        <button id="saveRecoveryDays">Save Recovery Days</button>
      </div>
      
      <div class="settings-card">
        <h3>Avatar Style</h3>
        <p class="muted">Choose the portrait style used for your class avatar. This will later be part of initial assessment.</p>
        <label>Avatar Style
          <select id="avatarStyleSetting">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </label>
        <button id="saveAvatarStyle">Save Avatar Style</button>
      </div>
<div class="settings-card">
        <h3>Character Details</h3>
        <p><strong>${info.emoji} ${info.name}</strong><br><span class="muted">${info.title}</span></p>
        <p><strong>Current Gear:</strong> ${info.gear[tier]} <span class="gear-percent">${gearProgress(p.level)}%</span></p>
        <p><strong>Next Unlock:</strong><br>${next ? info.gear[Math.min(tier+1,4)] + " at Level " + next : "Legendary tier reached"}</p>
      </div>
      <div class="settings-card">
        <h3>Voice Coach</h3>
        <label>Default Rest Seconds<input id="restSecondsSetting" type="number" min="15" max="300" value="${safeParse("restSeconds",90)}"></label>
        <button id="saveRestSeconds">Save Rest Timer</button>
      </div>
      <div class="settings-card">
        <h3>Codex</h3>
        <p class="muted">Reference information moved out of main navigation.</p>
      </div>
      <div class="settings-card">
        <h3>Data</h3>
        <button id="backupData">Backup Data</button>
        <button id="resetData" class="danger">Reset App Data</button>
      </div>
    </div>
  </div>`;
  wireSettings();
}

function wireSettings(){
  const selected = safeParse("recoveryDays", ["wed","sun"]);
  document.querySelectorAll(".rec-day").forEach(input => input.checked = selected.includes(input.value));
  $("saveRecoveryDays").addEventListener("click", () => {
    const days = Array.from(document.querySelectorAll(".rec-day:checked")).map(x => x.value);
    save("recoveryDays", days);
    alert("Recovery days saved.");
  });
  $("saveRestSeconds").addEventListener("click", () => {
    save("restSeconds", Number($("restSecondsSetting").value || 90));
    alert("Rest timer saved.");
  });
  $("backupData").addEventListener("click", () => {
    const data = {};
    for(let i=0;i<localStorage.length;i++){
      const key = localStorage.key(i);
      data[key] = localStorage.getItem(key);
    }
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `fitness-coach-backup-${todayKey()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  const avatarStyleInput = $("avatarStyleSetting");
  if(avatarStyleInput){
    avatarStyleInput.value = getAvatarStyle() === "f" ? "female" : "male";
    $("saveAvatarStyle").addEventListener("click", () => {
      const profile = safeParse("characterProfile", {});
      profile.avatarStyle = avatarStyleInput.value;
      save("characterProfile", profile);
      alert("Avatar style saved.");
      renderWorkout();
      renderSettings();
    });
  }

  $("resetData").addEventListener("click", () => {
    if(confirm("Reset all app data? This cannot be undone.")){
      localStorage.clear();
      location.reload();
    }
  });
  $("retakeAssessment").addEventListener("click", () => {
    alert("Assessment rebuild will be handled after Workout and Quests are stable.");
  });
}

function bindNav(){
  document.querySelectorAll(".app-nav button").forEach(button => {
    button.addEventListener("click", () => {
      document.querySelectorAll(".app-nav button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      button.classList.add("active");
      $(button.dataset.tab).classList.add("active");
      window.scrollTo(0,0);
    });
  });
}

function init(){
  bindNav();
  renderWorkout();
  renderQuests();
  renderSettings();
}

document.addEventListener("DOMContentLoaded", init);
window.FitnessCoachCleanApp = {renderWorkout,renderQuests,renderSettings,getRecoveryMap};
})();
</script>
<script>

/* v101 Runtime Set Completion Fix */
(function(){
"use strict";

function todayKeyV101(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function safeParseV101(key, fallback){
  try { return JSON.parse(localStorage.getItem(key) || "null") ?? fallback; }
  catch { return fallback; }
}
function saveV101(key, value){
  localStorage.setItem(key, JSON.stringify(value));
}
function progressKey(){
  return `setProgress-${todayKeyV101()}`;
}
function getProgressMap(){
  return safeParseV101(progressKey(), {});
}
function saveProgressMap(map){
  saveV101(progressKey(), map);
}
function getSetCount(exerciseIndex){
  return Number(getProgressMap()[exerciseIndex] || 0);
}
function setSetCount(exerciseIndex, count){
  const map = getProgressMap();
  map[exerciseIndex] = count;
  saveProgressMap(map);
}
function getSetTotal(card){
  const existing = card.querySelectorAll(".set-pill").length;
  if(existing) return existing;
  return 3;
}
function ensureExerciseIndex(card, index){
  if(!card.dataset.exerciseIndex) card.dataset.exerciseIndex = String(index);
  return Number(card.dataset.exerciseIndex);
}
function buildDots(total, exerciseIndex){
  return `<div class="set-progress-row" data-v101-progress="${exerciseIndex}">
    <div class="set-dots">${Array.from({length:total}).map((_,i)=>`<span class="set-dot" data-dot-index="${i}"></span>`).join("")}</div>
    <span class="set-count-label" data-set-count="${exerciseIndex}">0 / ${total} Sets Complete</span>
  </div>`;
}
function ensureSetPills(card, total){
  const grid = card.querySelector(".set-grid");
  if(!grid) return;
  grid.querySelectorAll(".set-pill").forEach((pill, i) => {
    pill.dataset.setIndex = String(i);
  });
}
function ensureProgressUI(card, exerciseIndex, total){
  if(!card.querySelector(`[data-v101-progress="${exerciseIndex}"]`)){
    const setGrid = card.querySelector(".set-grid");
    if(setGrid) setGrid.insertAdjacentHTML("beforebegin", buildDots(total, exerciseIndex));
  }
  if(!card.querySelector(`[data-exercise-reward="${exerciseIndex}"]`)){
    const setGrid = card.querySelector(".set-grid");
    if(setGrid) setGrid.insertAdjacentHTML("afterend", `<div class="exercise-complete-reward" data-exercise-reward="${exerciseIndex}" style="display:none">Exercise Complete • +25 XP</div>`);
  }
}
function updateCard(card){
  const exerciseIndex = Number(card.dataset.exerciseIndex || 0);
  const total = getSetTotal(card);
  const count = Math.min(getSetCount(exerciseIndex), total);

  card.querySelectorAll(".set-pill").forEach((pill, i) => {
    const setIndex = Number(pill.dataset.setIndex || i);
    pill.classList.toggle("completed", setIndex < count);
  });

  card.querySelectorAll(".set-dot").forEach((dot, i) => {
    const setIndex = Number(dot.dataset.dotIndex || i);
    dot.classList.toggle("completed", setIndex < count);
  });

  const label = card.querySelector(`[data-set-count="${exerciseIndex}"]`);
  if(label) label.textContent = `${count} / ${total} Sets Complete`;

  const reward = card.querySelector(`[data-exercise-reward="${exerciseIndex}"]`);
  if(reward) reward.style.display = count >= total ? "block" : "none";

  const btn = card.querySelector("[data-log-exercise]");
  if(btn){
    if(count >= total){
      btn.textContent = "Exercise Complete ✓";
      btn.disabled = true;
    } else {
      btn.textContent = `Log Set ${count + 1}`;
      btn.disabled = false;
    }
  }

  card.classList.toggle("complete", count >= total);
}
function wireCard(card, index){
  const exerciseIndex = ensureExerciseIndex(card, index);
  const total = getSetTotal(card);
  ensureSetPills(card, total);
  ensureProgressUI(card, exerciseIndex, total);
  card.dataset.setUiReady = "true";

  const btn = card.querySelector("[data-log-exercise]");
  if(btn && !btn.dataset.v101SetLog){
    btn.dataset.v101SetLog = "true";
    btn.addEventListener("click", function(event){
      event.preventDefault();
      event.stopImmediatePropagation();

      const current = getSetCount(exerciseIndex);
      if(current >= total) return;

      const next = current + 1;
      setSetCount(exerciseIndex, next);

      const logs = safeParseV101("exerciseLogs", []);
      const title = card.querySelector("h4")?.textContent?.replace(/^✓\s*/,"").trim() || `Exercise ${exerciseIndex+1}`;
      logs.push({
        date: todayKeyV101(),
        completedAt: new Date().toISOString(),
        exerciseTitle: title,
        exerciseIndex,
        setNumber: next,
        totalSets: total
      });
      saveV101("exerciseLogs", logs);

      updateCard(card);
    }, true);
  }

  updateCard(card);
}
function applySetUI(){
  document.querySelectorAll(".exercise-card").forEach((card, index) => wireCard(card, index));
}
function patchCompleteWorkout(){
  const btn = document.getElementById("completeWorkout");
  if(btn && !btn.dataset.v101CompletePatch){
    btn.dataset.v101CompletePatch = "true";
    btn.addEventListener("click", function(){
      localStorage.removeItem(progressKey());
    }, true);
  }
}
function run(){
  applySetUI();
  patchCompleteWorkout();
}
document.addEventListener("DOMContentLoaded", () => {
  run();
  [300, 900, 1800, 3000].forEach(ms => setTimeout(run, ms));
});
document.addEventListener("click", event => {
  if(event.target && event.target.matches("[data-tab], .app-nav button, #refreshAfterReward")){
    setTimeout(run, 100);
    setTimeout(run, 500);
  }
}, true);

window.FitnessCoachV101SetUI = {run, applySetUI};
})();

</script>
